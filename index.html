<!DOCTYPE html><html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Карточки для Кариночки 💖</title>
<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #ffe6f0, #fff);
  display: flex;
  flex-direction: column;
  align-items: center;
  min-height: 100vh;
}h2 { color: #ff4d88; margin-top: 20px; }

.card { width: 320px; height: 200px; perspective: 1000px; margin-top: 40px; }

.inner { width: 100%; height: 100%; position: relative; transform-style: preserve-3d; transition: transform 0.6s; }

.flipped { transform: rotateY(180deg); }

/* фикс бага с зеркалом */ .inner { transform: rotateY(0deg); }

.front, .back { transform: rotateY(180deg); background: #ff2e75; color: #ffffff; transform: rotateY(180deg); }

.front { transform: rotateY(0deg); background: #ffffff; color: #ff2e75; }

.back { background: #ff4d88; color: white; transform: rotateY(180deg); }

.controls { margin-top: 25px; display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }

button { padding: 10px 15px; border: none; border-radius: 12px; background: #ff4d88; color: white; cursor: pointer; font-size: 14px; }

button:hover { background: #ff1a66; }

#stats { margin-top: 20px; color: #ff4d88; }

</style>
</head>
<body><h2>💖 Карточки для Кариночки 💖</h2><div class="card" id="card">
  <div id="cardInner" class="inner">
    <div class="front" id="frontText">Загрузка...</div>
    <div class="back" id="backText"></div>
  </div>
</div><div class="controls">
  <button onclick="flipCard()">Перевернуть 💗</button>
  <button onclick="nextCard()">Следующая ➡️</button>
  <button onclick="shuffleCards()">Перемешать 🔀</button>
  <button onclick="toggleMode()">Сменить режим 🔄</button>
</div><p id="stats"></p><script>

let mode = 0; // 0 = сначала область применения, 1 = наоборот

let cards = [
  {q: "метан, пропан, нефть, природный газ", a: "используются как топливо"},
  {q: "этилен", a: "производство пластмасс"},
  {q: "ацетилен", a: "сварка и резка металлов"},
  {q: "пропилен", a: "полипропилен"},
  {q: "изопрен, бутадиен", a: "каучук и резина"},
  {q: "ацетон, метанол, толуол", a: "растворители"},
  {q: "этиленгликоль", a: "антифриз"},
  {q: "глицерин", a: "косметика и медицина"},
  {q: "уксусная кислота", a: "консервант"},
  {q: "лимонная кислота", a: "пищевая промышленность"},
  {q: "стеарат натрия", a: "моющие средства"},
  {q: "анилин", a: "красители и лекарства"},
  {q: "целлюлоза", a: "производство бумаги"}
];

let current = 0;
let flipped = false;
let viewed = 0;

function loadCard() {
  const frontEl = document.getElementById("frontText");
  const backEl = document.getElementById("backText");

  if (!cards[current]) return;

  let front = mode === 0 ? cards[current].a : cards[current].q;
  let back = mode === 0 ? cards[current].q : cards[current].a;

  frontEl.innerText = "💖 " + front;
  backEl.innerText = "💗 " + back;
}

function flipCard() {
  document.getElementById("cardInner").classList.toggle("flipped");
  flipped = !flipped;
}

function nextCard() {
  if (!flipped) {
    alert("Сначала переверни карточку 💔");
    return;
  }

  viewed++;
  current++;

  if (current >= cards.length) {
    document.getElementById("stats").innerText = "💖 Ты прошла все карточки!";
    current = 0;
    viewed = 0;
  }

  flipped = false;
  document.getElementById("cardInner").classList.remove("flipped");
  loadCard();
}

function shuffleCards() {
  cards.sort(() => Math.random() - 0.5);
  current = 0;
  loadCard();
}

function toggleMode() {
  mode = mode === 0 ? 1 : 0;
  current = 0;
  loadCard();
}

// ВАЖНО: запуск после загрузки страницы
window.onload = function() {
  loadCard();
  document.getElementById("card").addEventListener("click", flipCard);
};

</script></body>
</html>
