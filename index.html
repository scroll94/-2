<!DOCTYPE html><html lang="ru">
<head>
<meta charset="UTF-8">
<title>Карточки для Кариночки 💖</title>
<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #ffe6f0, #fff);
  display: flex;
  flex-direction: column;
  align-items: center;
}h2 { color: #ff4d88; }

.card { width: 320px; height: 200px; perspective: 1000px; margin-top: 30px; cursor: pointer; }

.inner { width: 100%; height: 100%; position: relative; transform-style: preserve-3d; transition: transform 0.6s; }

.flipped { transform: rotateY(180deg); }

.front, .back { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; display: flex; justify-content: center; align-items: center; border-radius: 20px; font-size: 18px; padding: 15px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }

.front { background: #fff; color: #ff4d88; }

.back { background: #ffb6c1; color: white; transform: rotateY(180deg); }

.controls { margin-top: 20px; display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }

button { padding: 10px 15px; border: none; border-radius: 12px; background: #ff4d88; color: white; cursor: pointer; }

button:hover { background: #ff1a66; }

#stats { margin-top: 20px; color: #ff4d88; }

.heart { font-size: 20px; }

</style>
</head>
<body><h2>💖 Карточки для Кариночки 💖</h2><div class="card" onclick="flipCard()">
  <div id="cardInner" class="inner">
    <div class="front" id="frontText"></div>
    <div class="back" id="backText"></div>
  </div>
</div><div class="controls">
  <button onclick="nextCard()">Следующая ➡️</button>
  <button onclick="shuffleCards()">Перемешать 🔀</button>
  <button onclick="toggleMode()">Сменить режим 🔄</button>
</div><p id="stats"></p><script>

let mode = 0; // 0 = вопрос→ответ, 1 = ответ→вопрос

let cards = [
  {q: "метан, пропан, нефть, природный газ", a: "в качестве топлива"},
  {q: "этилен", a: "производство пластмасс"},
  {q: "ацетилен", a: "сварка металлов и резка"},
  {q: "пропилен", a: "полипропилен"},
  {q: "изопрен, бутадиен", a: "каучук и резина"},
  {q: "ацетон, метанол, толуол", a: "растворители"},
  {q: "этиленгликоль", a: "антифриз"},
  {q: "глицерин", a: "косметика и медицина"},
  {q: "уксусная кислота", a: "консервант"},
  {q: "лимонная кислота", a: "пищевая промышленность"},
  {q: "стеарат натрия", a: "моющие средства"},
  {q: "анилин", a: "красители"},
  {q: "целлюлоза", a: "бумага"}
];

let current = 0;
let flipped = false;
let viewed = 0;

function loadCard() {
  let front = mode === 0 ? cards[current].q : cards[current].a;
  let back = mode === 0 ? cards[current].a : cards[current].q;

  document.getElementById("frontText").innerText = "💖 " + front;
  document.getElementById("backText").innerText = "💗 " + back;
}

function flipCard() {
  const card = document.getElementById("cardInner");
  card.classList.toggle("flipped");
  flipped = !flipped;
}

function nextCard() {
  if (!flipped) {
    alert("Сначала переверни карточку 💔");
    return;
  }

  viewed++;
  current++;

  if (current >= cards.length) {
    document.getElementById("stats").innerText = `💖 Ты прошла всё! Просмотрено: ${viewed}`;
    current = 0;
    viewed = 0;
  }

  flipped = false;
  document.getElementById("cardInner").classList.remove("flipped");
  loadCard();
}

function shuffleCards() {
  cards.sort(() => Math.random() - 0.5);
  current = 0;
  viewed = 0;
  loadCard();
}

function toggleMode() {
  mode = mode === 0 ? 1 : 0;
  current = 0;
  viewed = 0;
  loadCard();
}

loadCard();

</script></body>
</html>
