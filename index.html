<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Карточки по химии</title>

<style>
body {
    font-family: Arial;
    background: #111;
    color: white;
    text-align: center;
}

.controls {
    margin: 20px;
}

button {
    padding: 10px 15px;
    margin: 5px;
    border: none;
    cursor: pointer;
    border-radius: 8px;
}

.container {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
}

.card {
    width: 200px;
    height: 120px;
    margin: 10px;
    perspective: 1000px;
}

.inner {
    width: 100%;
    height: 100%;
    transition: 0.6s;
    transform-style: preserve-3d;
    position: relative;
}

.card.flip .inner {
    transform: rotateY(180deg);
}

.front, .back {
    position: absolute;
    width: 100%;
    height: 100%;
    background: #222;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 10px;
    backface-visibility: hidden;
}

.back {
    background: #444;
    transform: rotateY(180deg);
}
</style>
</head>

<body>

<h1>Карточки по химии</h1>

<div class="controls">
    <button onclick="shuffle()">Перемешать</button>
    <button onclick="swap()">Поменять местами</button>
</div>

<div class="container" id="cards"></div>

<script>
let swapped = false;

let data = [
    ["лимонная кислота", "пищевая промышленность, удаление накипи"],
    ["стеарат натрия", "производство моющих средств"],
    ["триолеин", "производство маргарина"],
    ["капрон", "текстильные волокна"],
    ["анилин", "красители и лекарства"],
    ["целлюлоза", "производство бумаги"],
    ["метан, пропан", "топливо"],
    ["этилен", "пластмассы и этанол"],
    ["ацетилен", "сварка и пластмассы"],
    ["пропилен, стирол", "пластмассы"],
    ["полипропилен", "упаковка"],
    ["изопрен", "каучук"],
    ["ацетон", "растворитель"],
    ["этанол", "медицина и пища"],
    ["формальдегид", "пластмассы"],
    ["этиленгликоль", "антифриз"],
    ["глицерин", "косметика"],
    ["тринитроглицерин", "взрывчатка"],
    ["уксусная кислота", "консерванты"]
];

function render() {
    let container = document.getElementById("cards");
    container.innerHTML = "";

    data.forEach(item => {
        let card = document.createElement("div");
        card.className = "card";

        let inner = document.createElement("div");
        inner.className = "inner";

        let front = document.createElement("div");
        front.className = "front";
        front.innerText = swapped ? item[1] : item[0];

        let back = document.createElement("div");
        back.className = "back";
        back.innerText = swapped ? item[0] : item[1];

        inner.appendChild(front);
        inner.appendChild(back);
        card.appendChild(inner);

        card.onclick = () => card.classList.toggle("flip");

        container.appendChild(card);
    });
}

function shuffle() {
    data.sort(() => Math.random() - 0.5);
    render();
}

function swap() {
    swapped = !swapped;
    render();
}

render();
</script>

</body>
</html>
