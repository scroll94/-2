[20:26, 05.04.2026] Scroll: <!DOCTYPE html><html lang="ru">
<head>
<meta charset="UTF-8">
<title>Карточки для Кариночки 💖</title>
<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #ffe6f0, #fff);
  display: flex;
  flex-direction: column;
  align-items: center;
}h2 { color: #ff4d88; }

.card { width: 320px; height: 200px; perspective: 1000px; margin-top: 30px; cursor: pointer; }

.inner { width: 100%; height: 100%; position: relative; transform-style: preserve-3d; transition: transform 0.6s; }

.flipped { transform: rotateY(180deg); }

.front, .back { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; display: flex; justify-content: center; align-items: center; border-radius: 20px; font-size: 18px; padding: 15px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }

.front { background: #fff; color: #ff4d88; }

.back { background: #ffb6c1; color: white; transform: rotateY(180deg); }

.controls { margin-top: 20px; display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }

button { padding: 10px 15px; border: none; border-radius: 12px; background: #ff4d88; color: white; cursor: pointer; }

button:hover { background: #ff1a66; }

#stats { margin-top: 20px; color: #ff4d88; }

.heart { font-size: 20px; }

</style>
</head>
<body><h2>💖 Карточки для Кариночки 💖</h2><div class="card" onclick="flipCard()">
  <div id="cardInner" class="inner">
    <div class="front" id="frontText"></div>
