<!DOCTYPE html><html lang="ru">
<head>
<meta charset="UTF-8">
<title>Карточки по химии</title>
<style>
body {
  font-family: Arial;
  background: #f0f0f0;
  display: flex;
  flex-direction: column;
  align-items: center;
}.card { width: 300px; height: 200px; perspective: 1000px; margin-top: 50px; cursor: pointer; }

.inner { width: 100%; height: 100%; position: relative; transform-style: preserve-3d; transition: transform 0.6s; }

.flipped { transform: rotateY(180deg); }

.front, .back { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; display: flex; justify-content: center; align-items: center; border-radius: 12px; font-size: 18px; padding: 10px; }

.front { background: white; }

.back { background: lightblue; transform: rotateY(180deg); }

button { margin-top: 20px; padding: 10px 20px; font-size: 16px; }

</style>
</head>
<body><h2>Карточки по химии</h2><div class="card" onclick="flipCard()">
  <div id="cardInner" class="inner">
    <div class="front" id="frontText"></div>
    <div class="back" id="backText"></div>
  </div>
</div><button onclick="nextCard()">Следующая</button>

<p id="stats"></p><script>

const cards = [
  {q: "метан, пропан, нефть, природный газ", a: "в качестве топлива"},
  {q: "этилен", a: "производство пластмасс"},
  {q: "ацетилен", a: "сварка металлов"},
  {q: "пропилен", a: "полипропилен"},
  {q: "изопрен", a: "каучук и резина"}
];

let current = 0;
let flipped = false;
let correct = 0;

function loadCard() {
  document.getElementById("frontText").innerText = cards[current].q;
  document.getElementById("backText").innerText = cards[current].a;
}

function flipCard() {
  const card = document.getElementById("cardInner");
  card.classList.toggle("flipped");
  flipped = !flipped;
}
function nextCard() {
  if (!flipped) {
    alert("Сначала переверни карточку!");
    return;
  }

  current++;

  if (current >= cards.length) {
    document.getElementById("stats").innerText = "Ты просмотрел все карточки!";
    current = 0;
  }

  flipped = false;
  document.getElementById("cardInner").classList.remove("flipped");
  loadCard();
}

loadCard();

</script></body>
</html>
